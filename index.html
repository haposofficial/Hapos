
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaPOS - Free POS for Small Businesses</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a237e 0%, #283593 50%, #3949ab 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
        }
        .logo {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .logo span {
            color: #ffca28;
        }
        .tagline {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 40px;
        }
        .coming-soon {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .description {
            font-size: 15px;
            opacity: 0.8;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        .contact {
            font-size: 13px;
            opacity: 0.6;
        }
        .contact a {
            color: #ffca28;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Ha<span>POS</span></div>
        <div class="tagline">Free POS for Small Businesses</div>
        <div class="coming-soon">Coming Soon</div>
        <p class="description">
            A powerful, offline-first Point of Sale app for distributors, restaurants, and retail stores. 100% free, no subscriptions.
        </p>
        <p class="contact">Contact: <a href="mailto:hapos.official@gmail.com">hapos.official@gmail.com</a></p>
    </div>
</body>
</html>
